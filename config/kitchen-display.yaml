    entity_id: sensor.e_price_today_high_hour
    id: e_price_today_high_hour
    internal: true

  - platform: template
    name: "${esp_name} Battery"
    id: batt
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    lambda: |-
      int y = (1-(4.1-id(batt_volt).state)/(4.1-3.3))*100;
      if (y < 100) {return y;} else {return 100;};
    update_interval: never

  - platform: homeassistant
    entity_id: sensor.skoda_suberb_battery_level
    id: car_battery_percent
    internal: true


  - platform: homeassistant
    entity_id: sensor.temperature_now
    id: temperature_now
    internal: true
    on_value:  # Actions to perform once data for the last sensor has been received
      then:
        - script.execute: all_data_received

script:
  - id: all_data_received
    then:
      - component.update: batt_volt
      - component.update: batt
      - component.update: t5_display
      - if:
          condition:
            - binary_sensor.is_on: display_deep_sleep
          then:
            - deep_sleep.enter:
                id: deep_sleep_1
                sleep_duration: ${sleep_time}
          else:
            - logger.log: "Ha-deep-sleep sensor is off, skipping sleep"

display:
  - platform: t547
    id: t5_display
    rotation: 270
    update_interval: never
    lambda: |-
      #define xres 540 
      #define yres 960
      #define x_pad 10 // border padding
      #define y_pad 10 // border padding      
      #define cat_pad 85 // padding before category
      #define val_pad 70 // padding before value
      #define icon_pad 35 //padding after icons      
      #define x1n 20 //x position 1st column name
      #define x1v 25 //x position 1st column value
      #define x1i 50 //x position 1st column icon
      #define x2n xres/2 //x position 2nd column name
      #define x2v xres/2 //x position 2nd column value
      #define x2i xres/2 //x position 1st column icon
      #define weather_icon_x xres/4-x_pad

      int y = 0;
      
      // Date
      it.strftime(xres/2, y+y_pad, id(font_name), TextAlign::TOP_CENTER, "%A   %d.%m.%Y", id(ntp).now());

      y+=val_pad+cat_pad-20;


      //Weather forecast Icon
      if (id(forecast_0d_condition).state == "clear-night") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F0594");}
      if (id(forecast_0d_condition).state == "cloudy") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F0590");}
      if (id(forecast_0d_condition).state == "partlycloudy") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F0595");}
      if (id(forecast_0d_condition).state == "fog") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F0591");}
      if (id(forecast_0d_condition).state == "hail") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F0592");}
      if (id(forecast_0d_condition).state == "lightning") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F0593");}
      if (id(forecast_0d_condition).state == "lightning-rainy") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F067E");}
      if (id(forecast_0d_condition).state == "pouring") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F0596");}
      if (id(forecast_0d_condition).state == "rainy") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F0597");}
      if (id(forecast_0d_condition).state == "snowy") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F0F36");}
      if (id(forecast_0d_condition).state == "snowy-rainy") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F067F");}
      if (id(forecast_0d_condition).state == "sunny") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F0599");}
      if (id(forecast_0d_condition).state == "windy") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F059D");}
      if (id(forecast_0d_condition).state == "windy-variant") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F059E");}
      if (id(forecast_0d_condition).state == "exceptional") {
        it.printf(weather_icon_x, y, id(font_icons), TextAlign::CENTER, "\U000F0F38");} 
      
      it.printf(x2i, y-20, id(font_70_bold), TextAlign::CENTER_LEFT, "%.1f", id(temperature_now).state);

      y+=20;
      //it.printf(x2i+30, y-15, id(font_icons_small), TextAlign::BASELINE_CENTER, "\U000F10C2"); // temp high
      //it.printf(x2i+30+icon_pad, y-10, id(font_value), TextAlign::BASELINE_LEFT, "%.1f °C", id(temperature_now).state);
      //it.printf(x2i+30, y+15, id(font_icons_small), TextAlign::TOP_CENTER, "\U000F10C3"); // temp low
      //it.printf(x2i+30+icon_pad, y+10, id(font_value),  TextAlign::TOP_LEFT, "%.1f °C", id(forecast_0d_temp_low).state);
      
      it.printf(x2i-10, y+50, id(font_icons_smallest), TextAlign::CENTER_RIGHT, "\U000F10C2");
      it.printf(x2i-10, y+50, id(font_name),  TextAlign::CENTER_LEFT, "%.1f", id(forecast_0d_temp_high).state);
      it.printf(x2i+140, y+50, id(font_icons_smallest), TextAlign::CENTER_RIGHT, "\U000F10C3"); // temp low
      it.printf(x2i+140, y+50, id(font_name),  TextAlign::CENTER_LEFT, "%.1f", id(forecast_0d_temp_low).state);

      y+=cat_pad+30;
      
      // Outside Temp + Precipitation
      it.print(x1n, y, id(font_name), TextAlign::BASELINE_LEFT, "Huomenna");
      it.print(x2n, y, id(font_name), TextAlign::BASELINE_LEFT, "Ylihuomenna");
      y+=val_pad;      

      int weather_icon_1d_x=x1n+50;

      //Weather forecast Icon
      if (id(forecast_1d_condition).state == "clear-night") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0594");}
      if (id(forecast_1d_condition).state == "cloudy") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0590");}
      if (id(forecast_1d_condition).state == "partlycloudy") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0595");}
      if (id(forecast_1d_condition).state == "fog") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0591");}
      if (id(forecast_1d_condition).state == "hail") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0592");}
      if (id(forecast_1d_condition).state == "lightning") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0593");}
      if (id(forecast_1d_condition).state == "lightning-rainy") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F067E");}
      if (id(forecast_1d_condition).state == "pouring") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0596");}
      if (id(forecast_1d_condition).state == "rainy") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0597");}
      if (id(forecast_1d_condition).state == "snowy") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0F36");}
      if (id(forecast_1d_condition).state == "snowy-rainy") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F067F");}
      if (id(forecast_1d_condition).state == "sunny") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0599");}
      if (id(forecast_1d_condition).state == "windy") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F059D");}
      if (id(forecast_1d_condition).state == "windy-variant") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F059E");}
      if (id(forecast_1d_condition).state == "exceptional") {
        it.printf(weather_icon_1d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0F38");} 

      it.printf(x1v+170, y-10, id(font_name), TextAlign::BASELINE_CENTER, "%.1f °C", id(forecast_1d_temp).state);
      it.printf(x1v+170, y+20, id(font_footer), TextAlign::BASELINE_CENTER, "%.1f °C", id(forecast_1d_temp_low).state);

      int weather_icon_2d_x=x2n+50;

      //Weather forecast Icon
      if (id(forecast_2d_condition).state == "clear-night") {
        it.printf(weather_icon_2d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0594");}
      if (id(forecast_2d_condition).state == "cloudy") {
        it.printf(weather_icon_2d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0590");}
      if (id(forecast_2d_condition).state == "partlycloudy") {
        it.printf(weather_icon_2d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0595");}
      if (id(forecast_2d_condition).state == "fog") {
        it.printf(weather_icon_2d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0591");}
      if (id(forecast_2d_condition).state == "hail") {
        it.printf(weather_icon_2d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0592");}
      if (id(forecast_2d_condition).state == "lightning") {
        it.printf(weather_icon_2d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0593");}
      if (id(forecast_2d_condition).state == "lightning-rainy") {
        it.printf(weather_icon_2d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F067E");}
      if (id(forecast_2d_condition).state == "pouring") {
        it.printf(weather_icon_2d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0596");}
      if (id(forecast_2d_condition).state == "rainy") {
        it.printf(weather_icon_2d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0597");}
      if (id(forecast_2d_condition).state == "snowy") {
        it.printf(weather_icon_2d_x, y, id(weather_icons_100), TextAlign::CENTER, "\U000F0F36");}
      if (id(forecast_2d_condition).state == "snowy-rainy") {
