---
substitutions:
  esp_name: Kitchen Display  # Device Name
  esp_hostname: kitchen-display
  ip_address: 192.168.1.107
  ip_gw: 192.168.1.1
  ip_netmask: 255.255.255.0
  run_time: 5min  # can be as long as needed to get data
  sleep_time: 20min  # normal sleep time

esphome:
  name: ${esp_hostname}
  friendly_name: ${esp_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

external_components:
  - source: github://danuw/esphome-components2
    components: ["t547"]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${esp_name} Fallback Hotspot"
    password: !secret fallback_ap_password

deep_sleep:
  run_duration: ${run_time}
  sleep_duration: ${sleep_time}
  id: deep_sleep_1
  esp32_ext1_wakeup:
    pins: GPIO39
    mode: ALL_LOW

captive_portal:

web_server:
  port: 80
  include_internal: true

ota:
  password: !secret ota_password

# Enable logging
logger:

# Enable Home Assistant API
api:

time:
  - platform: homeassistant
    timezone: "Europe/Helsinki"
    id: ntp
    on_time:  # Deep sleep at 24:00 and wake up at 4:30.
      - hours: 0
        then:
          - delay: 1s
          - deep_sleep.enter:
              id: deep_sleep_1
              until: "04:30:00"
              time_id: ntp

spi:
  clk_pin: 18
  mosi_pin: 23

font:
  - file: "gfonts://Open Sans@600"
    id: font_name
    size: 38
  - file: "gfonts://Open Sans@600"
    id: font_70_bold
    size: 70
  - file: "gfonts://Open Sans@500"
    id: font_value
    size: 56
  - file: "gfonts://Open Sans@500"
    id: font_value_small
    size: 40
  - file: "gfonts://Open Sans@400"
    id: font_35
    size: 35
  - file: "gfonts://Open Sans@400"
    id: font_30
    size: 30
  - file: "gfonts://Open Sans@500"
    id: font_20
    size: 20
  - file: "gfonts://Open Sans@500"
    id: font_23
    size: 23
  - file: "gfonts://Open Sans@500"
    id: font_footer
    size: 28
    # https://pictogrammers.github.io/@mdi/font/5.3.45/
  - file: 'resources/materialdesignicons-webfont.ttf'
    id: font_icons
    size: 160
    glyphs:
      - "\U000F0594"  # clear-night
      - "\U000F0590"  # cloudy
      - "\U000F0595"  # partlycloudy
      - "\U000F0591"  # fog
      - "\U000F0592"  # hail
      - "\U000F0593"  # lightning
      - "\U000F067E"  # lightning-rainy
      - "\U000F0596"  # pouring
      - "\U000F0597"  # rainy
      - "\U000F0F36"  # snowy
      - "\U000F067F"  # snowy-rainy
      - "\U000F0599"  # sunny
      - "\U000F059D"  # windy
      - "\U000F059E"  # windy-variant
      - "\U000F0F38"  # exceptional
  - file: 'resources/materialdesignicons-webfont.ttf'
    id: weather_icons_100
    size: 90
    glyphs:
      - "\U000F0594"  # clear-night
      - "\U000F0590"  # cloudy
      - "\U000F0595"  # partlycloudy
      - "\U000F0591"  # fog
      - "\U000F0592"  # hail
      - "\U000F0593"  # lightning
      - "\U000F067E"  # lightning-rainy
      - "\U000F0596"  # pouring
      - "\U000F0597"  # rainy
      - "\U000F0F36"  # snowy
      - "\U000F067F"  # snowy-rainy
      - "\U000F0599"  # sunny
      - "\U000F059D"  # windy
      - "\U000F059E"  # windy-variant
      - "\U000F0F38"  # exceptional

  - file: 'resources/materialdesignicons-webfont.ttf'
    id: font_icons_small
    size: 80
    glyphs:
      - "\U000F10C2"  # Temperature High
      - "\U000F10C3"  # Temperature Low
      - "\U000F07E4"  # CO2
      - "\U000F054B"  # umbrella
      - "\U000F0592"  # hail
      - "\U000F0593"  # lightning
      - "\U000F067E"  # lightning-rainy
      - "\U000F0597"  # rainy
      - "\U000F0F36"  # snowy
      - "\U000F0594"  # clear-night
      - "\U000F0599"  # sunny
      - "\U000F07CA"  # fuel
      - "\U000F024A"  # flower
      - "\U000F051F"  # time-remaining
      - "\U000F140B"  # Energy

  - file: 'resources/materialdesignicons-webfont.ttf'
    id: font_icons_smallest
    size: 40
    glyphs:
      - "\U000F10C2"  # Temperature High
      - "\U000F10C3"  # Temperature Low
      - "\U000F07E4"  # CO2
      - "\U000F054B"  # umbrella
      - "\U000F0592"  # hail
      - "\U000F0593"  # lightning
      - "\U000F067E"  # lightning-rainy
      - "\U000F0597"  # rainy
      - "\U000F0F36"  # snowy
      - "\U000F0594"  # clear-night
      - "\U000F0599"  # sunny
      - "\U000F07CA"  # fuel
      - "\U000F024A"  # flower
      - "\U000F051F"  # time-remaining
      - "\U000F140B"  # Energy

button:
  - platform: restart
    name: "${esp_name} Restart"

  - platform: template
    name: "${esp_name} Refresh"
    icon: "mdi:update"
    on_press:
      then:
        - component.update: t5_display

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
    name: "${esp_name} Button 1"
    on_press:
      then:
        - component.update: t5_display

  - platform: gpio
    pin:
      number: GPIO34
      inverted: true
    name: "${esp_name} Button 2"

  - platform: gpio
    pin:
      number: GPIO35
      inverted: true
    name: "${esp_name} Button 3"
    on_press:
      then:
        - component.update: t5_display

  - platform: homeassistant
    entity_id: input_boolean.kitchen_display_deep_sleep
    id: display_deep_sleep
    internal: true

text_sensor:
  - platform: homeassistant
    entity_id: input_text.forecast_0d_condition
    id: forecast_0d_condition
    internal: true
  - platform: homeassistant
    entity_id: input_text.forecast_1d_condition
    id: forecast_1d_condition
    internal: true
  - platform: homeassistant
    entity_id: input_text.forecast_2d_condition
    id: forecast_2d_condition
    internal: true
sensor:
  - platform: adc
    pin: GPIO36
    name: "${esp_name} Battery Voltage"
    id: batt_volt
    attenuation: 11db
    update_interval: never
    filters:
      - multiply: 2

  - platform: homeassistant
    entity_id: input_number.forecast_0d_temperature
    id: forecast_0d_temp_high
    internal: true

  - platform: homeassistant
    entity_id: input_number.forecast_0d_temperature_low
    id: forecast_0d_temp_low
    internal: true

  - platform: homeassistant
    entity_id: input_number.forecast_1d_temperature
    id: forecast_1d_temp
    internal: true

  - platform: homeassistant
    entity_id: input_number.forecast_1d_temperature_low
    id: forecast_1d_temp_low
    internal: true

  - platform: homeassistant
    entity_id: input_number.forecast_2d_temperature
    id: forecast_2d_temp
    internal: true

  - platform: homeassistant
    entity_id: input_number.forecast_2d_temperature_low
    id: forecast_2d_temp_low
    internal: true

  - platform: homeassistant
    entity_id: sensor.nordpool
    id: current_e_price
    internal: true

  - platform: homeassistant
    entity_id: sensor.e_price_today_high
    id: e_price_today_high
    internal: true

  - platform: homeassistant
    entity_id: sensor.e_price_today_0
    id: e_price_today_0
    internal: true

  - platform: homeassistant
